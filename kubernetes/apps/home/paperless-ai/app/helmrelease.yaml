---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ai
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      paperless-ai:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        containers:
          app:
            image:
              repository: clusterzx/paperless-ai
              tag: "3.0.9"
            env:
              PUID: "1000"
              PGID: "1000"
              PAPERLESS_AI_PORT: "3000"
              PAPERLESS_API_URL: "http://paperless.home.svc.cluster.local:8000/api"
              RAG_SERVICE_ENABLED: "false"
              CUSTOM_BASE_URL: "https://openrouter.ai/api/v1"
              CUSTOM_MODEL: "ganthropic/claude-3-5-haiku"
              AI_PROVIDER: "custom"
            envFrom:
              - secretRef:
                  name: paperless-ai-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: paperless-ai
        ports:
          http:
            port: &port 3000

    route:
      app:
        hostnames:
          - paperless-ai.f-wi.com
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      data:
        enabled: true
        existingClaim: paperless-ai-data
        globalMounts:
          - path: /app/data